<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    background: black;
}

/* VIDEO */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
    z-index: -2;
    opacity: 1;
    transition: opacity 1s ease-in-out;
}

/* overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    z-index: -1;
}

/* content */
.content {
    position: relative;
    top: 20%;
    display: none; /* hide initially */
    padding: 0 10px;
}

h1 {
    font-size: 50px;
    word-wrap: break-word;
}

/* typing text */
#typing {
    font-size: 22px;
    border-right: 2px solid white;
    display: inline-block;
    white-space: nowrap;
    overflow: hidden;
}

/* buttons */
button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    margin: 20px;
}

#yesBtn {
    background: white;
    color: #ff4d6d;
}

#noBtn {
    background: #ff4d6d;
    color: white;
    position: absolute;
}

/* hearts */
.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* YES popup */
#yesPopup {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60px;
    color: #ff4d6d;
    font-family: 'Brush Script MT', cursive;
    opacity: 0;
    z-index: 999;
    pointer-events: none;
    transition: opacity 2s ease-in-out;
}

/* Go Button */
#goBtn {
    font-size: 40px;
    padding: 20px 50px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    background: white;
    color: #ff4d6d;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* MOBILE RESPONSIVE */
@media only screen and (max-width: 600px) {
    h1 {
        font-size: 32px;
    }
    #typing {
        font-size: 18px;
    }
    #yesBtn, #noBtn {
        font-size: 16px;
        padding: 10px 20px;
    }
    #goBtn {
        font-size: 28px;
        padding: 15px 40px;
    }
    #yesPopup {
        font-size: 36px;
    }
}

/* FIREWORKS CANVAS */
#fireworksCanvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;
    pointer-events: none;
}
</style>
</head>

<body>

<video id="bgVideo" autoplay muted></video>
<div class="overlay"></div>

<div class="content">
<h1>I'm Really Sorry Manika 😔❤️</h1>
<p id="typing"></p>

<br>
<button id="yesBtn" onclick="yesClick()">Yes 🥺</button>
<button id="noBtn">No 😒</button>
</div>

<!-- Background music -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- YES popup message -->
<div id="yesPopup"><br><br>Aww 🥺❤️ Thank you!! I love you forever 💖. <br> You Are My World 🥺❤️</div>

<!-- Go Button -->
<button id="goBtn" onclick="startEverything()">Go</button>

<!-- FIREWORKS CANVAS -->
<canvas id="fireworksCanvas"></canvas>

<script>
// VIDEO LIST
const videos = ["video1.mp4", "video2.mp4"];
let current = 0;

const video = document.getElementById("bgVideo");
const bgMusic = document.getElementById("bgMusic");
const content = document.querySelector(".content");
const goBtn = document.getElementById("goBtn");

// hearts
let heartsInterval;

// TYPING EFFECT
const text = "Sudu nona... please forgive me 🥺💖 I love you so much...";
let i = 0;

function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 50);
    }
}

// hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}

// start everything
function startEverything() {
    goBtn.style.display = "none"; // hide Go button
    content.style.display = "block"; // show content

    // start music
    bgMusic.play();

    // play first video
    video.src = videos[current];
    video.play();

    // smooth fade switch
    video.addEventListener("ended", () => {
        video.style.opacity = 0;

        setTimeout(() => {
            current = (current + 1) % videos.length;
            video.src = videos[current];
            video.play();
            video.style.opacity = 1;
        }, 1000);
    });

    // start typing
    typing();

    // start hearts
    heartsInterval = setInterval(createHeart, 300);
}

// NO move
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

function moveButton() {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// ================== FIREWORKS CODE ==================
const canvas = document.getElementById("fireworksCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

let fireworks = [];
let particles = [];

// FIREWORK CLASS
class Firework {
    constructor(x, y) {
        this.x = x;
        this.y = canvas.height;
        this.targetY = y;
        this.speed = 7 + Math.random() * 3;
        this.color = `hsl(${Math.random()*360}, 100%, 50%)`;
        this.exploded = false;
    }

    update() {
        if(this.y <= this.targetY && !this.exploded) {
            this.explode();
            this.exploded = true;
        } else {
            this.y -= this.speed;
        }
    }

    explode() {
        const count = 30 + Math.random() * 30;
        for(let i=0;i<count;i++){
            particles.push(new Particle(this.x, this.y, this.color));
        }
    }

    draw() {
        if(!this.exploded){
            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }
}

// PARTICLE CLASS
class Particle {
    constructor(x, y, color){
        this.x = x;
        this.y = y;
        this.color = color;
        this.speedX = (Math.random()-0.5)*8;
        this.speedY = (Math.random()-0.5)*8;
        this.alpha = 1;
        this.gravity = 0.2;
        this.friction = 0.95;
    }

    update(){
        this.speedY += this.gravity;
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedX *= this.friction;
        this.speedY *= this.friction;
        this.alpha -= 0.02;
    }

    draw(){
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

// ANIMATION LOOP
function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    fireworks.forEach((fw, i) => {
        fw.update();
        fw.draw();
        if(fw.exploded) fireworks.splice(i, 1);
    });

    particles.forEach((p, i) => {
        p.update();
        p.draw();
        if(p.alpha <= 0) particles.splice(i, 1);
    });
}

// START FIREWORKS ANIMATION
animate();

// YES click
function yesClick() {
    const popup = document.getElementById("yesPopup");
    popup.style.opacity = 1;

    // increase hearts speed
    clearInterval(heartsInterval);
    heartsInterval = setInterval(createHeart, 150);

    // launch multiple fireworks
    for(let i=0; i<5; i++){
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * (window.innerHeight/2);
        fireworks.push(new Firework(x, y));
    }
}
</script>

</body>
</html>
